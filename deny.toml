# cargo-deny configuration for the Kiseki workspace.
# Enforced in CI; see .github/workflows/ci.yml and Makefile.

[graph]
targets = [
    { triple = "x86_64-unknown-linux-gnu" },
    { triple = "aarch64-unknown-linux-gnu" },
]
all-features = true

[advisories]
version = 2
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]
yanked = "deny"
ignore = [
    "RUSTSEC-2024-0384", # `instant` unmaintained — transitive via openraft
    "RUSTSEC-2025-0020", # pyo3 PyString buffer overflow — not used in kiseki (transitive)
    "RUSTSEC-2025-0134", # rustls-pemfile unmaintained — awaiting upstream migration
    "RUSTSEC-2026-0104", # x509-parser CRL parsing panic — mitigated by input validation
]

[licenses]
version = 2
# Explicit allow-list; project policy is Apache-2.0 compatible only.
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BlueOak-1.0.0",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "BSL-1.0",
    "CC0-1.0",
    # CDDL is weak-copyleft at the file level. Used here only by
    # `inferno` (transitive of `pprof`), which is feature-gated
    # (`kiseki-server --features pprof`, `kiseki-profile` only) and
    # not part of the default release artifact. Distributing the
    # CDDL'd files unmodified alongside Apache-2.0 code is permitted.
    "CDDL-1.0",
    # CDLA-Permissive-2.0 is for data, not code. Used by
    # `webpki-roots` (Mozilla CA cert bundle pulled by reqwest →
    # rustls). Permissive, no patent or copyleft obligations.
    "CDLA-Permissive-2.0",
    "ISC",
    "MIT",
    "MPL-2.0",
    "OpenSSL",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
]
confidence-threshold = 0.93

[bans]
multiple-versions = "warn"
wildcards = "deny"
highlight = "all"
# Never pull in `ring` in production — FIPS crypto must come from aws-lc-rs.
# (Allowed transitively in tests/dev for now; promoted to deny when kiseki-crypto lands.)
deny = []
# Allow thiserror v1/v2 duplicate — redb 2.x uses thiserror v1, we use v2.
# Will resolve when redb upgrades to thiserror v2.
skip = [
    { crate = "thiserror@1", reason = "redb transitive dependency" },
    { crate = "thiserror-impl@1", reason = "redb transitive dependency" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
