name: Release

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1" # Weekly Monday 06:00 UTC

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  # ---------------------------------------------------------------------------
  # Preflight: format, clippy, tests, deny
  # ---------------------------------------------------------------------------
  preflight:
    name: Preflight checks
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: Swatinem/rust-cache@v2
      - name: Compute version
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - uses: taiki-e/install-action@nextest
      - run: cargo nextest run --workspace --exclude kiseki-acceptance --run-ignored all
      - name: Run BDD acceptance tests
        run: |
          output=$(cargo test -p kiseki-acceptance 2>&1)
          echo "$output" | tail -10
          if echo "$output" | grep -qE "[1-9][0-9]* failed"; then
            echo "::error::BDD scenarios failed"
            exit 1
          fi
      - uses: EmbarkStudios/cargo-deny-action@v2

  # ---------------------------------------------------------------------------
  # Server binary: kiseki-server — per-arch on Rocky 9
  # ---------------------------------------------------------------------------
  server:
    name: Server (${{ matrix.arch }})
    needs: preflight
    runs-on: ${{ matrix.runner }}
    container:
      image: rockylinux:9
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: aarch64
            runner: ubuntu-24.04-arm
    steps:
      - name: Install system dependencies
        run: |
          dnf install -y --allowerasing gcc gcc-c++ openssl-devel pkgconf-pkg-config \
            perl-IPC-Cmd git curl unzip tar gzip make findutils cmake

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Mark workspace safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - uses: dtolnay/rust-toolchain@stable
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: server-${{ matrix.arch }}

      - name: Build kiseki-server and kiseki-admin (all features, non-FIPS)
        run: |
          sed -i 's/default = \["fips"\]/default = []/' crates/kiseki-crypto/Cargo.toml
          cargo build --release --bin kiseki-server --bin kiseki-admin \
            --features kiseki-keymanager/kms-vault,kiseki-keymanager/kms-aws,kiseki-keymanager/kms-azure,kiseki-keymanager/kms-gcp

      - name: Package
        run: |
          mkdir -p dist
          cp target/release/kiseki-server dist/
          cp target/release/kiseki-admin dist/
          cd dist
          tar czf "../kiseki-server-${{ matrix.arch }}.tar.gz" *
          cd ..
          sha256sum "kiseki-server-${{ matrix.arch }}.tar.gz" > "kiseki-server-${{ matrix.arch }}.tar.gz.sha256"

      - uses: actions/upload-artifact@v7
        with:
          name: kiseki-server-${{ matrix.arch }}
          path: |
            kiseki-server-${{ matrix.arch }}.tar.gz
            kiseki-server-${{ matrix.arch }}.tar.gz.sha256

  # ---------------------------------------------------------------------------
  # Client library: kiseki-client — per-arch on Rocky 9
  # ---------------------------------------------------------------------------
  client:
    name: Client (${{ matrix.arch }})
    needs: preflight
    runs-on: ${{ matrix.runner }}
    container:
      image: rockylinux:9
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: aarch64
            runner: ubuntu-24.04-arm
    steps:
      - name: Install system dependencies
        run: |
          dnf install -y --allowerasing gcc gcc-c++ openssl-devel pkgconf-pkg-config \
            perl-IPC-Cmd git curl unzip tar gzip make findutils cmake \
            fuse3-devel

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Mark workspace safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - uses: dtolnay/rust-toolchain@stable
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: client-${{ matrix.arch }}

      - name: Build client library and CLI (FFI + FUSE)
        run: |
          sed -i 's/default = \["fips"\]/default = []/' crates/kiseki-crypto/Cargo.toml
          cargo build --release -p kiseki-client --features ffi,fuse
          cargo build --release --bin kiseki-client --features ffi,fuse

      - name: Package
        run: |
          mkdir -p dist
          cp target/release/libkiseki_client.so dist/ 2>/dev/null || \
          cp target/release/libkiseki_client.a dist/ 2>/dev/null || true
          cp target/release/kiseki-client dist/ 2>/dev/null || true
          cp crates/kiseki-client/include/kiseki_client.h dist/ 2>/dev/null || true
          cd dist
          tar czf "../kiseki-client-${{ matrix.arch }}.tar.gz" *
          cd ..
          sha256sum "kiseki-client-${{ matrix.arch }}.tar.gz" > "kiseki-client-${{ matrix.arch }}.tar.gz.sha256"

      - uses: actions/upload-artifact@v7
        with:
          name: kiseki-client-${{ matrix.arch }}
          path: |
            kiseki-client-${{ matrix.arch }}.tar.gz
            kiseki-client-${{ matrix.arch }}.tar.gz.sha256

  # ---------------------------------------------------------------------------
  # Docker image: ghcr.io
  # ---------------------------------------------------------------------------
  docker:
    name: Docker image
    needs: preflight
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.server
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ needs.preflight.outputs.version }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Publish crates to crates.io (topological order)
  # ---------------------------------------------------------------------------
  crates:
    name: Publish crates
    needs: [preflight]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: Swatinem/rust-cache@v2

      - name: Publish crates (topological order)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO }}
        run: |
          # Publish in dependency order. --no-verify skips build (already tested).
          # Sleep between publishes to let crates.io index catch up.
          CRATES=(
            kiseki-common
            kiseki-proto
            kiseki-block
            kiseki-crypto
            kiseki-raft
            kiseki-transport
            kiseki-log
            kiseki-audit
            kiseki-keymanager
            kiseki-chunk
            kiseki-composition
            kiseki-view
            kiseki-advisory
            kiseki-gateway
            kiseki-client
            kiseki-server
          )
          for crate in "${CRATES[@]}"; do
            echo "Publishing $crate..."
            cargo publish -p "$crate" --no-verify --allow-dirty 2>&1 || echo "  $crate: skipped (already published or not publishable)"
            sleep 5
          done

  # ---------------------------------------------------------------------------
  # Publish: GitHub release with all artifacts
  # ---------------------------------------------------------------------------
  publish:
    name: Publish release
    needs: [preflight, server, client, docker, crates]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.preflight.outputs.version }}
          name: kiseki v${{ needs.preflight.outputs.version }}
          generate_release_notes: true
          body: |
            Built on Rocky Linux 9 (glibc 2.34, kernel 5.14) — compatible with
            RHEL 9+, Rocky 9+, AlmaLinux 9+, Ubuntu 22.04+, Debian 12+, SLES 15 SP4+.

            ## Server binaries

            Deploy on storage nodes. Includes S3/NFS gateways, Raft consensus,
            admin web UI, Prometheus metrics, OpenTelemetry tracing, admin CLI.

            | Archive | Arch | Contents |
            |---------|------|----------|
            | `kiseki-server-x86_64` | x86_64 | kiseki-server, kiseki-admin |
            | `kiseki-server-aarch64` | aarch64 | kiseki-server, kiseki-admin |

            `kiseki-admin` is a standalone remote administration CLI that
            connects to any node via the REST API (:9090). Run from your
            workstation — no server dependencies required.

            ## Client library and CLI

            Deploy on compute nodes. FUSE mount, C FFI, client-side cache
            with staging, C/C++ header for native integration.
            Includes `kiseki-client` CLI for staging and cache management.
            Python SDK via `maturin develop --features python`.

            | Archive | Arch | Contents |
            |---------|------|----------|
            | `kiseki-client-x86_64` | x86_64 | kiseki-client + libkiseki_client.so + kiseki_client.h |
            | `kiseki-client-aarch64` | aarch64 | kiseki-client + libkiseki_client.so + kiseki_client.h |

            ## Docker image

            ```
            docker pull ghcr.io/${{ github.repository }}:${{ needs.preflight.outputs.version }}
            ```

            ## Crate integration (crates.io)

            ```toml
            kiseki-client = "${{ needs.preflight.outputs.version }}"
            kiseki-common = "${{ needs.preflight.outputs.version }}"
            ```
          files: |
            kiseki-server-*/kiseki-server-*.tar.gz
            kiseki-server-*/kiseki-server-*.tar.gz.sha256
            kiseki-client-*/kiseki-client-*.tar.gz
            kiseki-client-*/kiseki-client-*.tar.gz.sha256
