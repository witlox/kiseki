name: Release

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1" # Weekly Monday 06:00 UTC

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

jobs:
  # ---------------------------------------------------------------------------
  # Preflight: format, clippy, tests, deny
  # ---------------------------------------------------------------------------
  preflight:
    name: Preflight checks
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: Swatinem/rust-cache@v2
      - name: Compute and set version
        id: version
        run: |
          bash scripts/set-version.sh
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)"/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"
      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - uses: taiki-e/install-action@nextest
      - run: cargo nextest run --workspace --exclude kiseki-acceptance --run-ignored all
      - name: Run full BDD acceptance suite (incl. @slow scenarios)
        # Release runs the complete suite — `--features slow-tests` enables
        # the Raft-cluster scenarios that CI excludes for speed.
        run: |
          output=$(cargo test -p kiseki-acceptance --features slow-tests 2>&1)
          echo "$output" | tail -10
          if echo "$output" | grep -qE "[1-9][0-9]* failed"; then
            echo "::error::BDD scenarios failed"
            exit 1
          fi
      - uses: EmbarkStudios/cargo-deny-action@v2

  # ---------------------------------------------------------------------------
  # Server binary: kiseki-server — per-arch on Rocky 9
  # ---------------------------------------------------------------------------
  server:
    name: Server (${{ matrix.arch }})
    needs: preflight
    runs-on: ${{ matrix.runner }}
    container:
      image: rockylinux:9
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: aarch64
            runner: ubuntu-24.04-arm
    steps:
      - name: Install system dependencies
        run: |
          dnf install -y --allowerasing gcc gcc-c++ openssl-devel pkgconf-pkg-config \
            perl-IPC-Cmd git curl unzip tar gzip make findutils cmake \
            protobuf-compiler

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Mark workspace safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: server-${{ matrix.arch }}

      - name: Build kiseki-server and kiseki-admin (all features, non-FIPS)
        run: |
          sed -i 's/default = \["fips"\]/default = []/' crates/kiseki-crypto/Cargo.toml
          cargo build --release --bin kiseki-server --bin kiseki-admin \
            --features kiseki-keymanager/kms-vault,kiseki-keymanager/kms-aws,kiseki-keymanager/kms-azure,kiseki-keymanager/kms-gcp

      - name: Package
        run: |
          mkdir -p dist
          cp target/release/kiseki-server dist/
          cp target/release/kiseki-admin dist/
          cd dist
          tar czf "../kiseki-server-${{ matrix.arch }}.tar.gz" *
          cd ..
          sha256sum "kiseki-server-${{ matrix.arch }}.tar.gz" > "kiseki-server-${{ matrix.arch }}.tar.gz.sha256"

      - uses: actions/upload-artifact@v7
        with:
          name: kiseki-server-${{ matrix.arch }}
          path: |
            kiseki-server-${{ matrix.arch }}.tar.gz
            kiseki-server-${{ matrix.arch }}.tar.gz.sha256

  # ---------------------------------------------------------------------------
  # Client library: kiseki-client — per-arch on Rocky 9
  # ---------------------------------------------------------------------------
  client:
    name: Client (${{ matrix.arch }})
    needs: preflight
    runs-on: ${{ matrix.runner }}
    container:
      image: rockylinux:9
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x86_64
            runner: ubuntu-latest
          - arch: aarch64
            runner: ubuntu-24.04-arm
    steps:
      - name: Install system dependencies
        run: |
          dnf install -y --allowerasing gcc gcc-c++ openssl-devel pkgconf-pkg-config \
            perl-IPC-Cmd git curl unzip tar gzip make findutils cmake \
            fuse3-devel protobuf-compiler

      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - name: Mark workspace safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          key: client-${{ matrix.arch }}

      - name: Build client library and CLI (FFI + FUSE)
        run: |
          sed -i 's/default = \["fips"\]/default = []/' crates/kiseki-crypto/Cargo.toml
          cargo build --release -p kiseki-client --features ffi,fuse
          cargo build --release --bin kiseki-client --features ffi,fuse

      - name: Package
        run: |
          mkdir -p dist
          cp target/release/libkiseki_client.so dist/ 2>/dev/null || \
          cp target/release/libkiseki_client.a dist/ 2>/dev/null || true
          cp target/release/kiseki-client dist/ 2>/dev/null || true
          cp crates/kiseki-client/include/kiseki_client.h dist/ 2>/dev/null || true
          cd dist
          tar czf "../kiseki-client-${{ matrix.arch }}.tar.gz" *
          cd ..
          sha256sum "kiseki-client-${{ matrix.arch }}.tar.gz" > "kiseki-client-${{ matrix.arch }}.tar.gz.sha256"

      - uses: actions/upload-artifact@v7
        with:
          name: kiseki-client-${{ matrix.arch }}
          path: |
            kiseki-client-${{ matrix.arch }}.tar.gz
            kiseki-client-${{ matrix.arch }}.tar.gz.sha256

  # ---------------------------------------------------------------------------
  # Docker image: ghcr.io
  # ---------------------------------------------------------------------------
  docker:
    name: Docker image
    needs: preflight
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v6
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.server
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:${{ needs.preflight.outputs.version }}
            ghcr.io/${{ github.repository }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ---------------------------------------------------------------------------
  # Publish crates to crates.io (topological order)
  # ---------------------------------------------------------------------------
  crates:
    name: Publish crates
    needs: [preflight]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: Swatinem/rust-cache@v2

      - name: Publish crates (topological order)
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO }}
        run: |
          # Publish in dependency order. --no-verify skips build (already tested).
          # Sleep between publishes to let crates.io index catch up.
          CRATES=(
            kiseki-common
            kiseki-proto
            kiseki-block
            kiseki-crypto
            kiseki-raft
            kiseki-transport
            kiseki-log
            kiseki-audit
            kiseki-keymanager
            kiseki-chunk
            kiseki-composition
            kiseki-view
            kiseki-advisory
            kiseki-gateway
            kiseki-client
            kiseki-server
          )
          for crate in "${CRATES[@]}"; do
            echo "Publishing $crate..."
            cargo publish -p "$crate" --no-verify --allow-dirty 2>&1 || echo "  $crate: skipped (already published or not publishable)"
            sleep 5
          done

  # ---------------------------------------------------------------------------
  # E2E: docker compose single-node + 3-node — must pass before publish
  # ---------------------------------------------------------------------------
  e2e:
    name: E2E Integration
    needs: preflight
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: Swatinem/rust-cache@v2

      - name: Build kiseki-server
        run: cargo build --bin kiseki-server --locked

      - name: Build Docker image
        run: docker compose build

      - name: Start server
        run: docker compose up -d

      - name: Wait for health
        run: |
          for i in $(seq 1 30); do
            if docker compose exec -T kiseki-server timeout 1 bash -c 'echo > /dev/tcp/127.0.0.1/9100' 2>/dev/null; then
              echo "Server healthy after ${i}s"
              break
            fi
            sleep 1
          done

      - name: Install Python deps
        # Install from the e2e crate's pyproject.toml so dep updates
        # (e.g. the `requests` add for S3 / Vault / Keycloak / tracing
        # tests) land here automatically. Fallback list mirrors current
        # pyproject.toml so a transient project-install failure still
        # gives a working test environment.
        run: |
          pip install --quiet ./tests/e2e \
            || pip install --quiet grpcio grpcio-tools protobuf pytest \
                                   tenacity pydantic structlog requests

      - name: Run single-node e2e tests
        working-directory: tests/e2e
        # Ignore the 3-node test files. They use the `cluster` fixture,
        # which calls `docker compose down -v` to clear any single-node
        # stack before bringing up the 3-node one — that wipes the
        # kiseki-server container + volume mid-run, and every subsequent
        # single-node test fails connection-refused. Keep this list in
        # sync with the multi-node phase below.
        run: |
          pytest -ra --tb=short \
            --ignore=test_multi_node.py \
            --ignore=test_multi_node_resilience.py \
            --ignore=test_cross_node_replication.py

      - name: Teardown single-node
        run: docker compose down -v

      - name: Run multi-node e2e tests
        working-directory: tests/e2e
        env:
          # helpers/cluster.py:stop_cluster dumps `docker compose logs` here
          # *before* `down -v` runs. Without that the post-pytest "Collect
          # logs" step sees an empty `docker ps -a` because the per-module
          # fixture has already torn down the cluster.
          KISEKI_E2E_LOG_DUMP_DIR: /tmp/kiseki-e2e-logs
        run: |
          mkdir -p /tmp/kiseki-e2e-logs
          pytest -ra --tb=short \
            test_multi_node.py \
            test_multi_node_resilience.py \
            test_cross_node_replication.py

      - name: Collect logs on failure
        if: failure()
        # Two sources of logs: the in-test dumps from KISEKI_E2E_LOG_DUMP_DIR
        # (captured *before* fixture teardown), and the post-hoc compose logs
        # if anything is still alive at this point.
        run: |
          set +e
          echo "=== docker ps -a ==="
          docker ps -a
          echo "=== in-test log dumps ==="
          ls -la /tmp/kiseki-e2e-logs/ 2>/dev/null || echo "(no dumps written)"
          for f in /tmp/kiseki-e2e-logs/*.log; do
            [ -f "$f" ] || continue
            echo "--- $f ---"
            cat "$f"
          done
          echo "=== single-node compose logs (post-hoc) ==="
          docker compose logs --no-color || true
          echo "=== 3-node compose logs (post-hoc) ==="
          docker compose -f docker-compose.3node.yml logs --no-color || true

      - name: Upload e2e log dumps
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-cluster-logs
          path: /tmp/kiseki-e2e-logs/
          if-no-files-found: warn

      - name: Teardown
        if: always()
        run: docker compose -f docker-compose.3node.yml down -v 2>/dev/null; docker compose down -v 2>/dev/null; true

  # ---------------------------------------------------------------------------
  # Publish: GitHub release with all artifacts
  # ---------------------------------------------------------------------------
  publish:
    name: Publish release
    needs: [preflight, server, client, docker, crates, e2e]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v8
        with:
          pattern: kiseki-*
      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ needs.preflight.outputs.version }}
          name: kiseki v${{ needs.preflight.outputs.version }}
          generate_release_notes: true
          body: |
            Built on Rocky Linux 9 (glibc 2.34, kernel 5.14) — compatible with
            RHEL 9+, Rocky 9+, AlmaLinux 9+, Ubuntu 22.04+, Debian 12+, SLES 15 SP4+.

            ## Server binaries

            Deploy on storage nodes. Includes S3/NFS gateways, Raft consensus,
            admin web UI, Prometheus metrics, OpenTelemetry tracing, admin CLI.

            | Archive | Arch | Contents |
            |---------|------|----------|
            | `kiseki-server-x86_64` | x86_64 | kiseki-server, kiseki-admin |
            | `kiseki-server-aarch64` | aarch64 | kiseki-server, kiseki-admin |

            `kiseki-admin` is a standalone remote administration CLI that
            connects to any node via the REST API (:9090). Run from your
            workstation — no server dependencies required.

            ## Client library and CLI

            Deploy on compute nodes. FUSE mount, C FFI, client-side cache
            with staging, C/C++ header for native integration.
            Includes `kiseki-client` CLI for staging and cache management.
            Python SDK via `maturin develop --features python`.

            | Archive | Arch | Contents |
            |---------|------|----------|
            | `kiseki-client-x86_64` | x86_64 | kiseki-client + libkiseki_client.so + kiseki_client.h |
            | `kiseki-client-aarch64` | aarch64 | kiseki-client + libkiseki_client.so + kiseki_client.h |

            ## Docker image

            ```
            docker pull ghcr.io/${{ github.repository }}:${{ needs.preflight.outputs.version }}
            ```

            ## Crate integration (crates.io)

            ```toml
            kiseki-client = "${{ needs.preflight.outputs.version }}"
            kiseki-common = "${{ needs.preflight.outputs.version }}"
            ```
          files: |
            kiseki-server-*/kiseki-server-*.tar.gz
            kiseki-server-*/kiseki-server-*.tar.gz.sha256
            kiseki-client-*/kiseki-client-*.tar.gz
            kiseki-client-*/kiseki-client-*.tar.gz.sha256
