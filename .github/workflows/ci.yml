name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "specs/**"
      - "examples/**"
      - "*.md"
      - "infra/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "specs/**"
      - "examples/**"
      - "*.md"
      - "infra/**"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

# PRs:   Stage 1 (fast gates) + unit tests
# Push:  + BDD acceptance + proto/arch checks
#
# Stage 1: fast gates (fmt, clippy, deny) — parallel
# Stage 2: unit tests — after stage 1 (always)
#          BDD, proto, arch — after stage 1 (push only)
#
# The 14-job feature-flag compilation matrix lives in
# `feature-matrix.yml` — paths-filtered (Cargo.toml / build.rs)
# + nightly + workflow_dispatch + run-on-release.
#
# Coverage + e2e + slow BDD live in `release.yml` (weekly +
# workflow_dispatch). CI is fast-feedback only.

jobs:
  # ---------------------------------------------------------------------------
  # Stage 1 — fast checks, gate everything
  # ---------------------------------------------------------------------------

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings

  deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: EmbarkStudios/cargo-deny-action@v2

  # ---------------------------------------------------------------------------
  # Stage 2 — test suites (needs stage 1, all parallel)
  # ---------------------------------------------------------------------------

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [fmt, clippy, deny]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      # Two invocations because the kiseki-chunk-cluster gRPC + TLS
      # tests hang under any workspace-parallel load (process-wide
      # rustls CryptoProvider conflict with other tests' tonic
      # clients). Running them in a separate nextest process gives
      # them a fresh `rustls::crypto` install and they pass in 80 ms.
      - run: cargo nextest run --workspace --exclude kiseki-acceptance --exclude kiseki-chunk-cluster --locked --profile ci
      - run: cargo nextest run -p kiseki-chunk-cluster --locked --profile ci

  acceptance:
    name: BDD Acceptance (fast suite)
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [fmt, clippy, deny]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: Swatinem/rust-cache@v2
      - name: Build kiseki-server for ClusterHarness scenarios
        # @integration scenarios spawn real `kiseki-server` children via
        # the `ClusterHarness` fixture. Without this build the harness
        # can't find the binary and every ClusterHarness scenario fails
        # with "kiseki-server binary not found" — Format previously
        # masked this by cascade-skipping BDD; once Format went green
        # 54 scenarios surfaced as red on 2026-05-02.
        run: cargo build --locked --release -p kiseki-server
      - name: Run fast BDD acceptance suite (excludes @slow scenarios)
        # The `slow-tests` Cargo feature is intentionally NOT passed here.
        # @slow scenarios (Raft clusters, ~1s each) are filtered out by
        # `tests/acceptance.rs` when the feature is off — keep CI fast.
        # Run `cargo test -p kiseki-acceptance --features slow-tests` locally
        # to exercise them.
        run: |
          output=$(cargo test -p kiseki-acceptance --locked 2>&1)
          echo "$output" | tail -10
          if echo "$output" | grep -qE "[1-9][0-9]* failed"; then
            echo "::error::BDD scenarios failed"
            echo "$output" | grep -E "[1-9][0-9]* failed"
            echo "::group::Failed scenarios"
            # Cucumber prints `Step failed:` then `Defined:` then the
            # step-impl path on the next two lines, then `Step
            # panicked. Captured output: <message>`. Grab a 6-line
            # context window around each failure so we see the
            # scenario name, the step that failed, AND the panic
            # message — the full triage payload in one block.
            echo "$output" | grep -B 4 -A 2 "Step failed:" || true
            echo "::endgroup::"
            exit 1
          fi

  # E2E moved to release.yml — runs on workflow_dispatch / weekly schedule
  # and gates `publish`. CI keeps fast-feedback only.

  proto-coverage:
    name: Proto Coverage
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [fmt, clippy, deny]
    steps:
      - uses: actions/checkout@v6
      - name: Check every .proto is in build.rs
        run: |
          set -euo pipefail
          miss=0
          for f in specs/architecture/proto/kiseki/v1/*.proto; do
            name="kiseki/v1/$(basename "$f")"
            if ! grep -q "\"$name\"" crates/kiseki-proto/build.rs; then
              echo "::error file=$f::proto file not listed in crates/kiseki-proto/build.rs"
              miss=1
            fi
          done
          exit $miss

  arch-check:
    name: Architecture Check
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [fmt, clippy, deny]
    steps:
      - uses: actions/checkout@v6
      - name: Verify kiseki-control dependency boundary (ADR-027)
        run: |
          set -euo pipefail
          # ADR-027: kiseki-control depends ONLY on kiseki-common,
          # kiseki-proto, and observability shims (kiseki-tracing).
          # No data-path crates (log/chunk/composition/view/gateway/
          # client/keymanager/crypto/raft/transport/audit/advisory).
          deps=$(grep '^kiseki-' crates/kiseki-control/Cargo.toml \
            | grep -v 'kiseki-common\|kiseki-proto\|kiseki-tracing' \
            | grep -v '^#' || true)
          if [ -n "$deps" ]; then
            echo "::error::kiseki-control has forbidden dependencies: $deps"
            exit 1
          fi

  # Coverage moved to release.yml (weekly + workflow_dispatch) —
  # the codecov upload is a trend signal, not a merge gate, and
  # adding ~4 min to every push isn't worth the spend.
