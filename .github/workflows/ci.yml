name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "specs/**"
      - "examples/**"
      - "*.md"
      - "infra/**"
  pull_request:
    branches: [main]
    paths-ignore:
      - "docs/**"
      - "specs/**"
      - "examples/**"
      - "*.md"
      - "infra/**"

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-Dwarnings"

# PRs:   Stage 1 (fast gates) + unit tests
# Push:  All stages
#
# Stage 1: fast gates (fmt, clippy, deny) — parallel
# Stage 2: feature flag compilation matrix — after stage 1 (push only)
# Stage 3: unit tests — after stage 1 (always)
#          BDD, proto, arch — after stage 2 (push only)
#          (e2e lives in release.yml — too slow for every push)
# Stage 4: coverage — after stage 3 (push only)

jobs:
  # ---------------------------------------------------------------------------
  # Stage 1 — fast checks, gate everything
  # ---------------------------------------------------------------------------

  fmt:
    name: Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings

  deny:
    name: Cargo Deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: EmbarkStudios/cargo-deny-action@v2

  # ---------------------------------------------------------------------------
  # Stage 2 — feature flag compilation (needs stage 1)
  # ---------------------------------------------------------------------------

  feature-check:
    name: Feature Check (${{ matrix.name }})
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [fmt, clippy, deny]
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: crypto-fips
            cmd: cargo check -p kiseki-crypto --features fips --locked
          - name: crypto-compression
            cmd: cargo check -p kiseki-crypto --features compression --locked
          - name: gateway-nfs-only
            cmd: cargo check -p kiseki-gateway --no-default-features --features nfs --locked
          - name: gateway-s3-only
            cmd: cargo check -p kiseki-gateway --no-default-features --features s3 --locked
          - name: gateway-all
            cmd: cargo check -p kiseki-gateway --all-features --locked
          - name: client-fuse
            cmd: cargo check -p kiseki-client --features fuse --locked
          - name: server-default
            cmd: cargo check -p kiseki-server --locked
          - name: transport-verbs
            cmd: cargo check -p kiseki-transport --features verbs --locked
          - name: transport-cxi
            cmd: cargo check -p kiseki-transport --features cxi --locked
          - name: chunk-gpu-cuda
            cmd: cargo check -p kiseki-chunk --features gpu-cuda --locked
          - name: chunk-gpu-rocm
            cmd: cargo check -p kiseki-chunk --features gpu-rocm --locked
          - name: kms-vault
            cmd: cargo check -p kiseki-keymanager --features kms-vault --locked
          - name: kms-aws
            cmd: cargo check -p kiseki-keymanager --features kms-aws --locked
          - name: kms-azure
            cmd: cargo check -p kiseki-keymanager --features kms-azure --locked
          - name: kms-gcp
            cmd: cargo check -p kiseki-keymanager --features kms-gcp --locked
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: features-${{ matrix.name }}
      - name: Install libfuse3-dev (for client-fuse feature)
        if: matrix.name == 'client-fuse'
        run: sudo apt-get update && sudo apt-get install -y libfuse3-dev
      - run: ${{ matrix.cmd }}

  # ---------------------------------------------------------------------------
  # Stage 3 — test suites (needs stage 2, all parallel)
  # ---------------------------------------------------------------------------

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: [fmt, clippy, deny]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@nextest
      - run: cargo nextest run --workspace --exclude kiseki-acceptance --locked

  acceptance:
    name: BDD Acceptance (fast suite)
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [feature-check]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: Swatinem/rust-cache@v2
      - name: Run fast BDD acceptance suite (excludes @slow scenarios)
        # The `slow-tests` Cargo feature is intentionally NOT passed here.
        # @slow scenarios (Raft clusters, ~1s each) are filtered out by
        # `tests/acceptance.rs` when the feature is off — keep CI fast.
        # Run `cargo test -p kiseki-acceptance --features slow-tests` locally
        # to exercise them.
        run: |
          output=$(cargo test -p kiseki-acceptance --locked 2>&1)
          echo "$output" | tail -10
          if echo "$output" | grep -qE "[1-9][0-9]* failed"; then
            echo "::error::BDD scenarios failed"
            echo "$output" | grep -E "[1-9][0-9]* failed"
            exit 1
          fi

  # E2E moved to release.yml — runs on workflow_dispatch / weekly schedule
  # and gates `publish`. CI keeps fast-feedback only.

  proto-coverage:
    name: Proto Coverage
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [feature-check]
    steps:
      - uses: actions/checkout@v6
      - name: Check every .proto is in build.rs
        run: |
          set -euo pipefail
          miss=0
          for f in specs/architecture/proto/kiseki/v1/*.proto; do
            name="kiseki/v1/$(basename "$f")"
            if ! grep -q "\"$name\"" crates/kiseki-proto/build.rs; then
              echo "::error file=$f::proto file not listed in crates/kiseki-proto/build.rs"
              miss=1
            fi
          done
          exit $miss

  arch-check:
    name: Architecture Check
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [feature-check]
    steps:
      - uses: actions/checkout@v6
      - name: Verify kiseki-control dependency boundary (ADR-027)
        run: |
          set -euo pipefail
          # ADR-027: kiseki-control depends ONLY on kiseki-common,
          # kiseki-proto, and observability shims (kiseki-tracing).
          # No data-path crates (log/chunk/composition/view/gateway/
          # client/keymanager/crypto/raft/transport/audit/advisory).
          deps=$(grep '^kiseki-' crates/kiseki-control/Cargo.toml \
            | grep -v 'kiseki-common\|kiseki-proto\|kiseki-tracing' \
            | grep -v '^#' || true)
          if [ -n "$deps" ]; then
            echo "::error::kiseki-control has forbidden dependencies: $deps"
            exit 1
          fi

  # ---------------------------------------------------------------------------
  # Stage 4 — coverage (needs stage 3)
  # ---------------------------------------------------------------------------

  coverage:
    name: Coverage
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    needs: [test, acceptance]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
      - uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: Swatinem/rust-cache@v2
      - uses: taiki-e/install-action@cargo-llvm-cov
      - run: >
          cargo llvm-cov --workspace
          --exclude kiseki-acceptance
          --locked
          --lcov --output-path lcov.info
      - uses: codecov/codecov-action@v6
        with:
          files: lcov.info
          token: ${{ secrets.CODECOV_TOKEN }}
