name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-progress runs on the same ref when a new push arrives.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"
  RUST_BACKTRACE: 1

jobs:
  # -------------------------------------------------------------------
  # Rust: fmt, clippy, test, cargo-deny
  # -------------------------------------------------------------------
  rust:
    name: Rust (${{ matrix.toolchain }})
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        toolchain: [stable]
      fail-fast: false
    steps:
      - uses: actions/checkout@v4

      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          components: rustfmt, clippy

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: rustfmt
        run: cargo fmt --all -- --check

      - name: clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: test
        run: cargo test --workspace --all-targets

  rust-deny:
    name: Rust cargo-deny
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features

  # -------------------------------------------------------------------
  # Go: fmt, vet, test, lint
  # -------------------------------------------------------------------
  go:
    name: Go
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: control
    steps:
      - uses: actions/checkout@v4

      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version-file: control/go.mod
          cache-dependency-path: control/go.sum

      - name: gofmt -d (fails if any diff)
        run: test -z "$(gofmt -s -d .)" || { gofmt -s -d .; exit 1; }

      - name: go vet
        run: go vet ./...

      - name: go test -race
        run: go test -race ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          working-directory: control
          args: --timeout 5m

  # -------------------------------------------------------------------
  # Docs / specs sanity: fail if any .proto file is not referenced from
  # the kiseki-proto build script (prevents silent drift between the
  # canonical proto tree and what Rust compiles).
  # -------------------------------------------------------------------
  spec-proto-coverage:
    name: Proto coverage (specs ↔ build.rs)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Check every .proto is in build.rs
        run: |
          set -euo pipefail
          miss=0
          for f in specs/architecture/proto/kiseki/v1/*.proto; do
            name="kiseki/v1/$(basename "$f")"
            if ! grep -q "\"$name\"" crates/kiseki-proto/build.rs; then
              echo "::error file=$f::proto file not listed in crates/kiseki-proto/build.rs"
              miss=1
            fi
          done
          exit $miss
