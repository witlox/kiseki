# golangci-lint v2 configuration for the Kiseki control plane.
# Extends the kiseki coding guidelines (.claude/coding/go.md).

version: "2"

run:
  timeout: 5m
  tests: true

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - revive
    - unparam
    - errorlint
    - gocritic
    - gocyclo
    - nilerr
    - unconvert
  settings:
    gocyclo:
      min-complexity: 15
    revive:
      rules:
        - name: exported
        - name: package-comments
        - name: var-naming
        - name: unreachable-code
        - name: indent-error-flow
        - name: error-return
        - name: error-naming
        - name: context-as-argument
        - name: if-return

formatters:
  enable:
    - gofmt
    - goimports
  settings:
    goimports:
      local-prefixes:
        - github.com/witlox/kiseki

issues:
  max-issues-per-linter: 0
  max-same-issues: 0
