# Kiseki 3-node Raft cluster — TLS variant (Phase 15c.6 / RFC 9289).
#
# Usage:
#   tests/e2e/gen-tls-certs.sh   # one-time, generates ./tests/e2e/.tls/
#   docker compose -f docker-compose.3node-tls.yml up -d
#
# Same as docker-compose.3node.yml but with NFS-over-TLS enabled:
#   - KISEKI_CA_PATH / KISEKI_CERT_PATH / KISEKI_KEY_PATH set per node
#   - The plaintext-NFS audited fallback is OFF (no
#     KISEKI_ALLOW_PLAINTEXT_NFS / KISEKI_INSECURE_NFS) so the cluster
#     refuses to start without certs — i.e. mTLS is the sole NFS path.
#
# Test certs are mounted read-only from `tests/e2e/.tls/` (gitignored,
# regenerated by `gen-tls-certs.sh`). The same server cert serves all
# three nodes via SAN — see the gen script for SAN list.

services:
  kiseki-node1:
    image: kiseki-server:local
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "9100:9100"  # data-path gRPC
      - "9101:9101"  # advisory gRPC
      - "9000:9000"  # S3
      - "2049:2049"  # NFS
    environment:
      KISEKI_DATA_ADDR: "0.0.0.0:9100"
      KISEKI_ADVISORY_ADDR: "0.0.0.0:9101"
      KISEKI_S3_ADDR: "0.0.0.0:9000"
      KISEKI_NFS_ADDR: "0.0.0.0:2049"
      KISEKI_DATA_DIR: "/data"
      KISEKI_BOOTSTRAP: "true"
      KISEKI_NODE_ID: "1"
      KISEKI_RAFT_PEERS: "1=kiseki-node1:9300,2=kiseki-node2:9300,3=kiseki-node3:9300"
      KISEKI_RAFT_ADDR: "0.0.0.0:9300"
      KISEKI_CA_PATH: "/tls/ca.pem"
      KISEKI_CERT_PATH: "/tls/server.pem"
      KISEKI_KEY_PATH: "/tls/server.key"
      RUST_LOG: "kiseki_gateway=debug,kiseki_server=info"
    volumes:
      - node1-data:/data
      - ./tests/e2e/.tls:/tls:ro
    healthcheck:
      test: ["CMD-SHELL", "timeout 1 bash -c 'echo > /dev/tcp/127.0.0.1/9100' 2>/dev/null"]
      interval: 2s
      timeout: 2s
      retries: 15

  kiseki-node2:
    image: kiseki-server:local
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "9110:9100"
      - "9111:9101"
      - "9010:9000"
    environment:
      KISEKI_DATA_ADDR: "0.0.0.0:9100"
      KISEKI_ADVISORY_ADDR: "0.0.0.0:9101"
      KISEKI_S3_ADDR: "0.0.0.0:9000"
      KISEKI_NFS_ADDR: "0.0.0.0:2049"
      KISEKI_DATA_DIR: "/data"
      KISEKI_BOOTSTRAP: "false"
      KISEKI_NODE_ID: "2"
      KISEKI_RAFT_PEERS: "1=kiseki-node1:9300,2=kiseki-node2:9300,3=kiseki-node3:9300"
      KISEKI_RAFT_ADDR: "0.0.0.0:9300"
      KISEKI_CA_PATH: "/tls/ca.pem"
      KISEKI_CERT_PATH: "/tls/server.pem"
      KISEKI_KEY_PATH: "/tls/server.key"
      RUST_LOG: "kiseki_gateway=debug,kiseki_server=info"
    volumes:
      - node2-data:/data
      - ./tests/e2e/.tls:/tls:ro
    healthcheck:
      test: ["CMD-SHELL", "timeout 1 bash -c 'echo > /dev/tcp/127.0.0.1/9100' 2>/dev/null"]
      interval: 2s
      timeout: 2s
      retries: 15

  kiseki-node3:
    image: kiseki-server:local
    build:
      context: .
      dockerfile: Dockerfile.server
    ports:
      - "9120:9100"
      - "9121:9101"
      - "9020:9000"
    environment:
      KISEKI_DATA_ADDR: "0.0.0.0:9100"
      KISEKI_ADVISORY_ADDR: "0.0.0.0:9101"
      KISEKI_S3_ADDR: "0.0.0.0:9000"
      KISEKI_NFS_ADDR: "0.0.0.0:2049"
      KISEKI_DATA_DIR: "/data"
      KISEKI_BOOTSTRAP: "false"
      KISEKI_NODE_ID: "3"
      KISEKI_RAFT_PEERS: "1=kiseki-node1:9300,2=kiseki-node2:9300,3=kiseki-node3:9300"
      KISEKI_RAFT_ADDR: "0.0.0.0:9300"
      KISEKI_CA_PATH: "/tls/ca.pem"
      KISEKI_CERT_PATH: "/tls/server.pem"
      KISEKI_KEY_PATH: "/tls/server.key"
      RUST_LOG: "kiseki_gateway=debug,kiseki_server=info"
    volumes:
      - node3-data:/data
      - ./tests/e2e/.tls:/tls:ro
    healthcheck:
      test: ["CMD-SHELL", "timeout 1 bash -c 'echo > /dev/tcp/127.0.0.1/9100' 2>/dev/null"]
      interval: 2s
      timeout: 2s
      retries: 15

volumes:
  node1-data:
  node2-data:
  node3-data:
