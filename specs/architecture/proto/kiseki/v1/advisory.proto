syntax = "proto3";

// Workflow Advisory & Client Telemetry service.
// Spec: ADR-020 (analyst), ADR-021 (architect), specs/features/workflow-advisory.feature,
// specs/invariants.md I-WA1..I-WA18.
//
// Isolation: this service is served on its own gRPC listener and processed
// on a tokio runtime separate from the data path (I-WA2).
// All operations are re-authorized per message via mTLS identity (I-WA3).
// Telemetry and rejection responses are size-padded and latency-bucketed
// (ADR-021 §8) to prevent covert channels (I-WA15).

package kiseki.v1;

option go_package = "github.com/witlox/kiseki/control/proto/kiseki/v1";

import "kiseki/v1/common.proto";

// ============================================================================
// Service
// ============================================================================

service WorkflowAdvisoryService {
  // Lifecycle (unary, per-operation mTLS authorized — I-WA3).
  rpc DeclareWorkflow(DeclareWorkflowRequest) returns (DeclareWorkflowResponse);
  rpc EndWorkflow(EndWorkflowRequest) returns (EndWorkflowResponse);
  rpc PhaseAdvance(PhaseAdvanceRequest) returns (PhaseAdvanceResponse);
  rpc GetWorkflowStatus(GetWorkflowStatusRequest) returns (GetWorkflowStatusResponse);

  // Main channel: hints in, telemetry out, multiplexed (I-WA5..I-WA8).
  // One bidi stream per active workflow.
  rpc AdvisoryStream(stream AdvisoryClientMessage) returns (stream AdvisoryServerMessage);

  // Telemetry-only (server-streaming) variant for callers who do not submit hints.
  rpc SubscribeTelemetry(SubscribeTelemetryRequest) returns (stream TelemetryEvent);
}

// ============================================================================
// Correlation identity (I-WA3, I-WA4, I-WA10)
// ============================================================================

// WorkflowRef is the opaque capability reference carried on advisory messages
// AND on data-path operations (via a lightweight header). Authority is the
// caller's mTLS identity — mere knowledge of a WorkflowRef grants no access.
message WorkflowRef {
  // Opaque >=128-bit handle. Not human-readable. Scoped to the owning workload.
  bytes handle = 1;
}

// ClientId is pinned per native-client process (I-WA4). Generated by the
// client as a >=128-bit CSPRNG draw at process start. The advisory registrar
// binds (client_id, mTLS identity) at first use.
message ClientId {
  bytes value = 1;
}

// Per-operation correlation attached to every advisory message. The server
// re-validates the caller's mTLS identity against (org, project, workload)
// on every message (I-WA3).
message WorkflowCorrelation {
  OrgId       org            = 1;
  ProjectId   project        = 2; // optional (empty if tenant has no project level)
  WorkloadId  workload       = 3;
  ClientId    client_id      = 4;
  WorkflowRef workflow_ref   = 5;
  uint64      phase_id       = 6; // monotonic within workflow (I-WA13)
}

// ============================================================================
// Workload profile (one-shot at DeclareWorkflow)
// ============================================================================

enum WorkloadProfile {
  WORKLOAD_PROFILE_UNSPECIFIED   = 0;
  WORKLOAD_PROFILE_AI_TRAINING   = 1;
  WORKLOAD_PROFILE_AI_INFERENCE  = 2;
  WORKLOAD_PROFILE_HPC_CHECKPOINT= 3;
  WORKLOAD_PROFILE_BATCH_ETL     = 4;
  WORKLOAD_PROFILE_INTERACTIVE   = 5;
  // Custom profiles are not permitted on the wire — allow-list is policy-driven.
}

// ============================================================================
// DeclareWorkflow / EndWorkflow / PhaseAdvance / GetWorkflowStatus
// ============================================================================

message DeclareWorkflowRequest {
  ClientId         client_id      = 1; // bound to mTLS identity on first use
  WorkloadProfile  profile        = 2;
  // Initial phase is required. Phase tag is an opaque string whose semantic
  // interpretation is policy-driven (phase_not_monotonic enforcement uses
  // phase_id only). I-WA13.
  uint64           initial_phase_id = 3;
  string           initial_phase_tag= 4;
  uint32           ttl_seconds    = 5; // default 3600, max 86400, clamped by policy
}

message DeclareWorkflowResponse {
  oneof outcome {
    DeclareWorkflowSuccess success = 1;
    AdvisoryError           error  = 2;
  }
}

message DeclareWorkflowSuccess {
  WorkflowRef workflow_ref = 1;
  // Pools the workflow is authorized to reference in affinity hints.
  // Opaque handles minted by kiseki-advisory at Declare time; caller
  // uses them in PrefetchHint, AffinityHint, CollectiveAnnouncement.
  // Handles are valid until EndWorkflow / TTL expiry (ADR-021 §3.a).
  repeated PoolDescriptor available_pools = 2;
}

message PoolDescriptor {
  PoolHandle handle       = 1;
  // Tenant-chosen label; e.g., "fast-nvme", "bulk-nvme". Set via
  // control-plane policy at workload-authorization time. Not a
  // cluster-internal identifier (I-WA11).
  string     opaque_label = 2;
}

message EndWorkflowRequest {
  WorkflowCorrelation correlation = 1;
}

message EndWorkflowResponse {
  oneof outcome {
    Empty         ok    = 1;
    AdvisoryError error = 2;
  }
}

message Empty {}

message PhaseAdvanceRequest {
  WorkflowCorrelation correlation  = 1;
  uint64              next_phase_id= 2; // must be strictly > current (I-WA13)
  string              next_phase_tag = 3;
}

message PhaseAdvanceResponse {
  oneof outcome {
    Empty         ok    = 1;
    AdvisoryError error = 2;
  }
}

message GetWorkflowStatusRequest {
  WorkflowCorrelation correlation = 1;
}

message GetWorkflowStatusResponse {
  oneof outcome {
    WorkflowStatus status = 1;
    AdvisoryError  error  = 2;
  }
}

message WorkflowStatus {
  // Caller can only query its own workflows (I-WA3, I-WA6).
  uint64 current_phase_id         = 1;
  string current_phase_tag        = 2;
  uint32 hints_accepted_last_min  = 3;
  uint32 hints_rejected_last_min  = 4;
  // Response is size-padded per ADR-021 §8.
  bytes  padding = 15;
}

// ============================================================================
// AdvisoryStream (bidi hints + telemetry)
// ============================================================================

message AdvisoryClientMessage {
  // Correlation is sent on every message for defense-in-depth: the server
  // enforces exact match against the workflow the stream was established
  // for. A mismatch produces SCOPE_NOT_FOUND (I-WA3 per-operation).
  WorkflowCorrelation correlation = 1;
  oneof payload {
    Hint                       hint                 = 2;
    CollectiveAnnouncement     collective_announcement= 4;
    PrefetchHint               prefetch             = 5;
    // Heartbeat from client to keep stream alive (no action).
    Heartbeat                  heartbeat            = 6;
  }
  reserved 3; // was telemetry_subscription; use SubscribeTelemetry RPC instead
}

message AdvisoryServerMessage {
  oneof payload {
    HintAck         hint_ack   = 1;
    TelemetryEvent  telemetry  = 2;
    StreamWarning   warning    = 3; // e.g., budget_exceeded, cert_about_to_expire
  }
  // Size padding per ADR-021 §8 (I-WA15).
  bytes padding = 15;
}

message Heartbeat {}

// ============================================================================
// Hint taxonomy (I-WA11 — restricted target fields)
// ============================================================================

message Hint {
  // hint_id is client-assigned for correlating HintAck; opaque, unbounded is allowed
  // only up to 16 bytes; server may truncate.
  bytes hint_id = 1;

  oneof body {
    AccessPatternHint    access_pattern  = 2;
    PriorityHint         priority        = 3;
    AffinityHint         affinity        = 4;
    RetentionIntentHint  retention_intent= 5;
    DedupIntentHint      dedup_intent    = 6;
    DeadlineHint         deadline        = 7;
    // Prefetch, CollectiveAnnouncement carried on their own message types in
    // AdvisoryClientMessage.payload because of size/shape.
  }
}

enum AccessPattern {
  ACCESS_PATTERN_UNSPECIFIED = 0;
  ACCESS_PATTERN_SEQUENTIAL  = 1;
  ACCESS_PATTERN_RANDOM      = 2;
  ACCESS_PATTERN_STRIDED     = 3;
  ACCESS_PATTERN_BROADCAST   = 4;
}

message AccessPatternHint {
  AccessPattern pattern = 1;
  // Target MUST be a caller-owned composition_id; other target types are
  // rejected at schema validation (I-WA11, I-WA16).
  CompositionId composition = 2;
}

enum Priority {
  PRIORITY_UNSPECIFIED = 0;
  PRIORITY_INTERACTIVE = 1;
  PRIORITY_BATCH       = 2;
  PRIORITY_BULK        = 3;
}

message PriorityHint {
  Priority priority = 1;
}

// Affinity preference at pool granularity. Rack-level colocation is
// deferred to a follow-up feature and is NOT in v1 scope (gate-1
// finding: rack hint values could be a cross-tenant side channel).
message AffinityHint {
  PoolHandle preferred_pool = 1;
  // reserved for future extension (rack, node, zone)
  reserved 2 to 10;
}

// PoolHandle is the caller's tenant-scoped reference to an affinity pool,
// NOT the cluster-internal pool ID (I-WA11). Minted by kiseki-advisory at
// DeclareWorkflow time (returned in DeclareWorkflowSuccess.available_pools)
// and valid until EndWorkflow / TTL expiry.
message PoolHandle { bytes value = 1; }

enum RetentionIntent {
  RETENTION_INTENT_UNSPECIFIED = 0;
  RETENTION_INTENT_TEMP        = 1;
  RETENTION_INTENT_WORKING     = 2;
  RETENTION_INTENT_FINAL       = 3;
}

message RetentionIntentHint {
  RetentionIntent intent = 1;
  CompositionId   composition = 2;
}

enum DedupIntent {
  DEDUP_INTENT_UNSPECIFIED    = 0;
  DEDUP_INTENT_SHARED_ENSEMBLE = 1;
  DEDUP_INTENT_PER_RANK       = 2;
}

message DedupIntentHint {
  DedupIntent intent = 1;
  CompositionId composition = 2;
}

message DeadlineHint {
  // Deadline expressed in wall-clock time (per I-T5 it is advisory only).
  WallTime deadline = 1;
  CompositionId composition = 2;
}

// Prefetch: up to max_prefetch_tuples_per_hint tuples (I-WA16, default 4096,
// max 16384). Exceeding returns hint_too_large and the whole message is
// rejected (excess is not silently truncated).
message PrefetchHint {
  bytes hint_id = 1;
  repeated PrefetchTuple tuples = 2;
}

message PrefetchTuple {
  CompositionId composition = 1;
  uint64        offset      = 2;
  uint64        length      = 3;
}

// Collective I/O announcement (HPC N-to-N or N-to-1 checkpoint).
message CollectiveAnnouncement {
  bytes  hint_id        = 1;
  uint32 ranks          = 2;
  uint64 bytes_per_rank = 3;
  WallTime deadline     = 4;
  PoolHandle target_pool = 5;
}

// HintAck is emitted per hint, immediately. This is distinct from the
// per-second audit-event batching for hint-accepted / hint-throttled
// (I-WA8, ADR-021 §9). Client flow-control and hint correlation uses
// HintAck; audit volume uses batching.
message HintAck {
  bytes  hint_id = 1;
  enum   Outcome {
    OUTCOME_UNSPECIFIED = 0;
    OUTCOME_ACCEPTED    = 1;
    OUTCOME_THROTTLED   = 2;
    OUTCOME_REJECTED    = 3; // carries AdvisoryError
  }
  Outcome outcome = 2;
  AdvisoryError error = 3; // populated only on REJECTED / THROTTLED
}

// ============================================================================
// Telemetry
// ============================================================================

message SubscribeTelemetryRequest {
  WorkflowCorrelation correlation = 1;
  TelemetrySubscriptionOp subscription = 2;
}

message TelemetrySubscriptionOp {
  enum Action {
    ACTION_UNSPECIFIED = 0;
    ACTION_ADD         = 1;
    ACTION_REMOVE      = 2;
  }
  Action action = 1;
  repeated TelemetryChannel channels = 2;
}

enum TelemetryChannel {
  TELEMETRY_CHANNEL_UNSPECIFIED           = 0;
  TELEMETRY_CHANNEL_BACKPRESSURE          = 1;
  TELEMETRY_CHANNEL_MATERIALIZATION_LAG   = 2;
  TELEMETRY_CHANNEL_LOCALITY              = 3;
  TELEMETRY_CHANNEL_PREFETCH_EFFECTIVENESS= 4;
  TELEMETRY_CHANNEL_QOS_HEADROOM          = 5;
  TELEMETRY_CHANNEL_SHARD_SATURATION      = 6;
  TELEMETRY_CHANNEL_PIN_HEADROOM          = 7;
  TELEMETRY_CHANNEL_OWN_HOTSPOT           = 8;
  TELEMETRY_CHANNEL_REPAIR_DEGRADED       = 9;
}

message TelemetryEvent {
  TelemetryChannel channel = 1;
  oneof body {
    BackpressureSignal         backpressure        = 2;
    MaterializationLag         materialization_lag = 3;
    LocalityClassBundle        locality            = 4;
    PrefetchEffectiveness      prefetch_effectiveness = 5;
    QosHeadroom                qos_headroom        = 6;
    ShardSaturation            shard_saturation    = 7;
    PinHeadroom                pin_headroom        = 8;
    OwnHotspot                 own_hotspot         = 9;
    RepairDegradedWarning      repair_degraded    = 10;
  }
  // Padding bucketed per ADR-021 §8.
  bytes padding = 15;
}

enum BackpressureSeverity {
  BACKPRESSURE_SEVERITY_UNSPECIFIED = 0;
  BACKPRESSURE_SEVERITY_OK          = 1;
  BACKPRESSURE_SEVERITY_SOFT        = 2;
  BACKPRESSURE_SEVERITY_HARD        = 3;
}

enum RetryAfterBucket {
  RETRY_AFTER_BUCKET_UNSPECIFIED = 0;
  RETRY_AFTER_BUCKET_LT_50MS     = 1;
  RETRY_AFTER_BUCKET_50_250MS    = 2;
  RETRY_AFTER_BUCKET_250_1000MS  = 3;
  RETRY_AFTER_BUCKET_1_10S       = 4;
  RETRY_AFTER_BUCKET_GT_10S      = 5;
}

message BackpressureSignal {
  PoolHandle           pool         = 1; // caller-scoped pool handle
  BackpressureSeverity severity     = 2;
  RetryAfterBucket     retry_after  = 3;
}

message MaterializationLag {
  ViewId view_id = 1;
  // Bucketed milliseconds {<100, 100-500, 500-2000, 2000-10000, >10000}.
  uint32 lag_bucket = 2;
}

enum LocalityClass {
  LOCALITY_CLASS_UNSPECIFIED = 0;
  LOCALITY_CLASS_LOCAL_NODE  = 1;
  LOCALITY_CLASS_LOCAL_RACK  = 2;
  LOCALITY_CLASS_SAME_POOL   = 3;
  LOCALITY_CLASS_REMOTE      = 4;
  LOCALITY_CLASS_DEGRADED    = 5;
}

message LocalityClassBundle {
  CompositionId composition = 1;
  // One entry per chunk range; bucketed locality.
  repeated LocalityEntry entries = 2;
}

message LocalityEntry {
  uint64         range_offset = 1;
  uint64         range_length = 2;
  LocalityClass  class        = 3;
}

enum HeadroomBucket {
  HEADROOM_BUCKET_UNSPECIFIED = 0;
  HEADROOM_BUCKET_AMPLE       = 1;
  HEADROOM_BUCKET_MODERATE    = 2;
  HEADROOM_BUCKET_TIGHT       = 3;
  HEADROOM_BUCKET_EXHAUSTED   = 4;
}

message PrefetchEffectiveness {
  // Bucketed hit rate for prefetch tuples declared by this workflow.
  HeadroomBucket hit_rate_bucket = 1;
  uint64         declared_tuples_last_min = 2;
}

message QosHeadroom { HeadroomBucket headroom = 1; }
message PinHeadroom { HeadroomBucket headroom = 1; }
message ShardSaturation {
  ShardId              shard    = 1; // only caller-owned shards (I-WA6)
  BackpressureSeverity severity = 2;
  RetryAfterBucket     retry_after = 3;
}

message OwnHotspot {
  CompositionId  composition = 1;
  HeadroomBucket contention  = 2;
}

message RepairDegradedWarning {
  CompositionId composition = 1;
  bool          degraded    = 2;
  // Severity is enum-only: "advisory" or "urgent". No topology is ever included.
  enum Severity {
    SEVERITY_UNSPECIFIED = 0;
    SEVERITY_ADVISORY    = 1;
    SEVERITY_URGENT      = 2;
  }
  Severity severity = 3;
}

message StreamWarning {
  enum Kind {
    KIND_UNSPECIFIED         = 0;
    KIND_BUDGET_EXCEEDED     = 1;
    KIND_CERT_NEAR_EXPIRY    = 2;
    KIND_WORKFLOW_TTL_SOON   = 3;
    // Server-side liveness heartbeat (emitted every 10s of server-side
    // idleness). Clients missing three consecutive heartbeats should
    // reconnect.
    KIND_HEARTBEAT           = 4;
    // A subscription was revoked because policy narrowed (e.g., pool
    // no longer authorized). Emitted once per affected subscription
    // immediately before subscription termination.
    KIND_SUBSCRIPTION_REVOKED = 5;
  }
  Kind kind = 1;
}

// ============================================================================
// Errors (I-WA6 / ADR-021 §8: canonical SCOPE_NOT_FOUND for scope violations)
// ============================================================================

enum AdvisoryErrorCode {
  ADVISORY_ERROR_CODE_UNSPECIFIED     = 0;
  ADVISORY_ERROR_CODE_OK              = 1;
  ADVISORY_ERROR_CODE_ADVISORY_DISABLED     = 2;
  ADVISORY_ERROR_CODE_PROFILE_NOT_ALLOWED   = 3;
  ADVISORY_ERROR_CODE_PRIORITY_NOT_ALLOWED  = 4;
  ADVISORY_ERROR_CODE_BUDGET_EXCEEDED       = 5;
  ADVISORY_ERROR_CODE_DECLARE_RATE_EXCEEDED = 6;
  ADVISORY_ERROR_CODE_HINT_TOO_LARGE        = 7;
  ADVISORY_ERROR_CODE_FORBIDDEN_TARGET_FIELD = 8;
  ADVISORY_ERROR_CODE_PHASE_NOT_MONOTONIC   = 9;
  ADVISORY_ERROR_CODE_PROFILE_REVOKED       = 10;
  ADVISORY_ERROR_CODE_PRIORITY_REVOKED      = 11;
  ADVISORY_ERROR_CODE_RETENTION_POLICY_CONFLICT = 12;
  ADVISORY_ERROR_CODE_CERT_REVOKED          = 13;
  // Unified code for "caller is not authorized for this target" AND
  // "target does not exist". I-WA6, ADR-021 §8.
  ADVISORY_ERROR_CODE_SCOPE_NOT_FOUND       = 14;
  ADVISORY_ERROR_CODE_ADVISORY_UNAVAILABLE  = 15;
  ADVISORY_ERROR_CODE_PREFETCH_BUDGET_EXCEEDED = 16;
}

message AdvisoryError {
  AdvisoryErrorCode code    = 1;
  // Human-readable message MUST NOT reveal information about scope the caller
  // is not authorized for. Pre-canonicalized; treat as opaque in logic.
  string            message = 2;
  // Padding to bucketed size.
  bytes             padding = 15;
}
