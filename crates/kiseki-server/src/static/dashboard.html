<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kiseki — Cluster Dashboard</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg: #0f1117; --surface: #1a1d27; --border: #2a2d3a;
            --text: #e1e4ed; --text-dim: #8b8fa3;
            --accent: #6366f1; --green: #22c55e; --yellow: #eab308; --red: #ef4444;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace; background: var(--bg); color: var(--text); min-height: 100vh; }
        header { display: flex; align-items: center; gap: 16px; padding: 16px 32px; background: var(--surface); border-bottom: 1px solid var(--border); }
        header img { height: 36px; filter: brightness(0) invert(1); }
        header h1 { font-size: 20px; font-weight: 600; }
        header .subtitle { color: var(--text-dim); font-size: 13px; margin-left: auto; font-family: monospace; }
        main { padding: 24px 32px; max-width: 1400px; margin: 0 auto; }
        .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 16px; margin-bottom: 32px; }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px; transition: border-color 0.3s; }
        .card:hover { border-color: var(--accent); }
        .card h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-dim); margin-bottom: 8px; }
        .card .big-number { font-size: 28px; font-weight: 700; font-family: monospace; }
        .card .label { font-size: 11px; color: var(--text-dim); margin-top: 4px; }
        .card.healthy { border-left: 3px solid var(--green); }
        .card.degraded { border-left: 3px solid var(--yellow); }
        .card.down { border-left: 3px solid var(--red); }
        .section { margin-bottom: 32px; }
        .section h2 { font-size: 14px; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; color: var(--text-dim); }
        table { width: 100%; border-collapse: collapse; background: var(--surface); border-radius: 8px; overflow: hidden; }
        th, td { padding: 10px 16px; text-align: left; border-bottom: 1px solid var(--border); }
        th { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-dim); background: var(--bg); }
        td { font-size: 13px; font-family: monospace; }
        .badge { padding: 2px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; }
        .badge.healthy { background: rgba(34,197,94,0.15); color: var(--green); }
        .badge.down { background: rgba(239,68,68,0.15); color: var(--red); }
        .charts { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .chart-box { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 20px; }
        .chart-box h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-dim); margin-bottom: 12px; }
        canvas { max-height: 250px; }
        footer { text-align: center; padding: 24px; color: var(--text-dim); font-size: 11px; }
        @media (max-width: 768px) { .charts { grid-template-columns: 1fr; } main { padding: 16px; } }
    </style>
</head>
<body>
    <header>
        <img src="/ui/logo" alt="K" onerror="this.textContent='K'; this.style.fontSize='28px'; this.style.fontWeight='800'; this.style.color='#6366f1';">
        <h1>Kiseki</h1>
        <span class="subtitle" id="clock"></span>
    </header>
    <main>
        <div class="cards"
             hx-get="/ui/fragment/cluster-cards"
             hx-trigger="load, every 5s"
             hx-swap="innerHTML">
            <div class="card"><div class="big-number" style="color:var(--text-dim)">Loading...</div></div>
        </div>

        <div class="section">
            <h2>Nodes</h2>
            <div hx-get="/ui/fragment/node-table"
                 hx-trigger="load, every 5s"
                 hx-swap="innerHTML">
                <p style="color:var(--text-dim);padding:16px;">Loading nodes...</p>
            </div>
        </div>

        <div class="section">
            <h2>Performance</h2>
            <div class="charts">
                <div class="chart-box">
                    <h3>Data Volume per Node</h3>
                    <canvas id="dataChart"></canvas>
                </div>
                <div class="chart-box">
                    <h3>Gateway Requests per Node</h3>
                    <canvas id="requestChart"></canvas>
                </div>
            </div>
        </div>
    </main>
    <footer>Kiseki Distributed Storage System</footer>

    <script>
        // Clock
        function updateClock() {
            document.getElementById('clock').textContent = new Date().toISOString().replace('T',' ').slice(0,19) + ' UTC';
        }
        updateClock(); setInterval(updateClock, 1000);

        // Chart config
        Chart.defaults.color = '#8b8fa3';
        const chartOpts = {
            responsive: true,
            plugins: { legend: { labels: { color: '#8b8fa3', font: { size: 11 } } } },
            scales: {
                x: { ticks: { color: '#8b8fa3', font: { size: 10 } }, grid: { color: '#2a2d3a' } },
                y: { ticks: { color: '#8b8fa3', font: { size: 10 } }, grid: { color: '#2a2d3a' } },
            },
        };

        let dataChart = new Chart(document.getElementById('dataChart'), {
            type: 'bar',
            data: { labels: [], datasets: [
                { label: 'Written', data: [], backgroundColor: 'rgba(99,102,241,0.7)', borderRadius: 4 },
                { label: 'Read', data: [], backgroundColor: 'rgba(34,197,94,0.7)', borderRadius: 4 },
            ]},
            options: chartOpts,
        });

        let requestChart = new Chart(document.getElementById('requestChart'), {
            type: 'bar',
            data: { labels: [], datasets: [
                { label: 'Requests', data: [], backgroundColor: 'rgba(234,179,8,0.7)', borderRadius: 4 },
            ]},
            options: chartOpts,
        });

        async function updateCharts() {
            try {
                const r = await fetch('/ui/fragment/chart-data');
                const d = await r.json();
                dataChart.data.labels = d.labels;
                dataChart.data.datasets[0].data = d.writes;
                dataChart.data.datasets[1].data = d.reads;
                dataChart.update();
                requestChart.data.labels = d.labels;
                requestChart.data.datasets[0].data = d.requests;
                requestChart.update();
            } catch(e) {}
        }
        updateCharts(); setInterval(updateCharts, 5000);
    </script>
</body>
</html>
