[package]
name = "kiseki-client"
description = "Native client for Kiseki: FUSE mount, fabric discovery, client-side encryption."
version.workspace = true
edition.workspace = true
rust-version.workspace = true
license.workspace = true
repository.workspace = true

[lints]
workspace = true

[features]
default = []
ffi = []
fuse = ["fuser", "libc"]
python = ["pyo3"]

[dependencies]
kiseki-common = { workspace = true }
kiseki-gateway = { workspace = true }
fuser = { version = "0.16", optional = true }
libc = { workspace = true, optional = true }
pyo3 = { version = "0.23", optional = true }
thiserror = { workspace = true }
tracing = { workspace = true }
zeroize = { workspace = true }

[dev-dependencies]
kiseki-chunk = { workspace = true }
kiseki-composition = { workspace = true }
kiseki-crypto = { workspace = true }
proptest = { workspace = true }
tempfile = "3"
uuid = { workspace = true }
